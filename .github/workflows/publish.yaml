name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v0.1.0 or v0.1.0-next.0)"
        required: true
        type: string
      npm_tag:
        description: NPM dist-tag
        required: true
        default: next
        type: choice
        options:
          - next
          - latest
      dry_run:
        description: Run dry-run publish steps
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: 24
  ZIG_VERSION: 0.14.0
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-metadata:
    name: release metadata
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
    steps:
      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_NPM_TAG: ${{ inputs.npm_tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          normalize_bool() {
            local raw="${1:-}"
            local default_value="${2:-}"

            if [ -z "${raw}" ]; then
              raw="${default_value}"
            fi

            case "${raw}" in
              true|True|TRUE|1|yes|Yes|YES|on|On|ON)
                echo "true"
                ;;
              false|False|FALSE|0|no|No|NO|off|Off|OFF)
                echo "false"
                ;;
              *)
                echo "Invalid boolean value for dry_run: ${raw}" >&2
                exit 1
                ;;
            esac
          }

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${INPUT_RELEASE_TAG}"
            npm_tag="${INPUT_NPM_TAG}"
            dry_run="$(normalize_bool "${INPUT_DRY_RUN}" "true")"
          else
            release_tag="${REF_NAME}"
            if [[ "${release_tag}" == *"-"* ]]; then
              npm_tag="next"
            else
              npm_tag="latest"
            fi
            dry_run="false"
          fi

          echo "Resolved release_tag=${release_tag}"
          echo "Resolved npm_tag=${npm_tag}"
          echo "Resolved dry_run=${dry_run}"

          if [ -z "${release_tag}" ]; then
            echo "release_tag is required" >&2
            exit 1
          fi

          if [ "${npm_tag}" != "next" ] && [ "${npm_tag}" != "latest" ]; then
            echo "npm_tag must be one of: next, latest" >&2
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "npm_tag=${npm_tag}" >> "${GITHUB_OUTPUT}"
          echo "dry_run=${dry_run}" >> "${GITHUB_OUTPUT}"

  validate:
    name: validate
    runs-on: ubuntu-24.04
    needs: release-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release plan
        run: pnpm release:plan --tag "${{ needs.release-metadata.outputs.npm_tag }}" --release-tag "${{ needs.release-metadata.outputs.release_tag }}"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build-native:
    name: build native (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: ${{ contains(matrix.target, 'linux') && (contains(matrix.target, 'musl') || contains(matrix.target, 'aarch64')) }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install cargo-zigbuild
        if: ${{ contains(matrix.target, 'linux-musl') || contains(matrix.target, 'aarch64-unknown-linux') }}
        run: cargo install cargo-zigbuild --locked

      - name: Build native artifacts
        run: pnpm release:build --native-target "${{ matrix.target }}" --skip-workspace=true

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: artifacts/native/*
          if-no-files-found: error

  build-lsp:
    name: build lsp (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: ${{ contains(matrix.target, 'linux') && (contains(matrix.target, 'musl') || contains(matrix.target, 'aarch64')) }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install cargo-zigbuild
        if: ${{ contains(matrix.target, 'linux-musl') || contains(matrix.target, 'aarch64-unknown-linux') }}
        run: cargo install cargo-zigbuild --locked

      - name: Build lsp artifacts
        run: pnpm release:build --lsp-target "${{ matrix.target }}" --skip-workspace=true

      - name: Upload lsp artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lsp-${{ matrix.target }}
          path: artifacts/lsp
          if-no-files-found: error

  pack:
    name: pack
    runs-on: ubuntu-24.04
    needs:
      - validate
      - build-native
      - build-lsp
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: artifacts/native

      - name: Download lsp artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lsp-*
          merge-multiple: true
          path: artifacts/lsp

      - name: Pack release artifacts
        run: pnpm release:pack

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packed-release-artifacts
          path: |
            artifacts/native/**
            artifacts/lsp/**
            artifacts/npm/**
            artifacts/logs/**
          if-no-files-found: error

  verify:
    name: verify
    runs-on: ubuntu-24.04
    needs: pack
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download packed artifacts
        uses: actions/download-artifact@v4
        with:
          name: packed-release-artifacts
          path: artifacts

      - name: Verify artifacts
        run: pnpm release:verify

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verified-release-artifacts
          path: artifacts/**
          if-no-files-found: error

  publish-npm:
    name: publish npm
    runs-on: ubuntu-24.04
    needs:
      - verify
      - release-metadata
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download verified artifacts
        uses: actions/download-artifact@v4
        with:
          name: verified-release-artifacts
          path: artifacts

      - name: Publish npm tarballs
        env:
          NPM_TAG: ${{ needs.release-metadata.outputs.npm_tag }}
          DRY_RUN: ${{ needs.release-metadata.outputs.dry_run }}
        run: |
          echo "Publish mode: dry_run=${DRY_RUN}, npm_tag=${NPM_TAG}"

          if [ "${DRY_RUN}" = "true" ]; then
            echo "Running npm publish in dry-run mode."
            pnpm release:publish:npm --tag "${NPM_TAG}" --dry-run
          elif [ "${DRY_RUN}" = "false" ]; then
            echo "Running real npm publish."
            pnpm release:publish:npm --tag "${NPM_TAG}"
          else
            echo "Invalid canonical dry_run output: ${DRY_RUN}" >&2
            exit 1
          fi

  package-vsix:
    name: package vsix
    runs-on: ubuntu-24.04
    needs:
      - publish-npm
      - release-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download verified artifacts
        uses: actions/download-artifact@v4
        with:
          name: verified-release-artifacts
          path: artifacts

      - name: Package VSIX
        env:
          DRY_RUN: ${{ needs.release-metadata.outputs.dry_run }}
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            pnpm release:vsix --dry-run
          else
            pnpm release:vsix
          fi

      - name: Upload VSIX artifact
        if: ${{ needs.release-metadata.outputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: vela-rbxts-vsix
          path: artifacts/vsix/*.vsix
          if-no-files-found: error

  publish-vscode-marketplace:
    name: publish vscode marketplace
    runs-on: ubuntu-24.04
    needs:
      - package-vsix
      - release-metadata
    if: ${{ needs.release-metadata.outputs.dry_run != 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          name: vela-rbxts-vsix
          path: artifacts/vsix

      - name: Publish VSIX files
        env:
          RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "VSCE_PAT is required for VS Code Marketplace publishing." >&2
            exit 1
          fi

          prerelease_flag=""
          if [[ "${RELEASE_TAG}" == *"-"* ]]; then
            prerelease_flag="--pre-release"
          fi

          shopt -s nullglob
          vsix_files=(artifacts/vsix/*.vsix)
          if [ "${#vsix_files[@]}" -eq 0 ]; then
            echo "No VSIX files found in artifacts/vsix." >&2
            exit 1
          fi

          for vsix in "${vsix_files[@]}"; do
            echo "Publishing ${vsix}"
            if [ -n "${prerelease_flag}" ]; then
              pnpm --filter ./packages/vscode-extension exec vsce publish --packagePath "${vsix}" ${prerelease_flag}
            else
              pnpm --filter ./packages/vscode-extension exec vsce publish --packagePath "${vsix}"
            fi
          done
